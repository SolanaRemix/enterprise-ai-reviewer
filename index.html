<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Autonomous Repository Governance Dashboard">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <title>CAST BRAIN - Autonomous Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #020617;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--slate-950);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Smooth glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Prevent text zoom on orientation change */
        html { -webkit-text-size-adjust: 100%; }

        /* ── Neo Glow Flash Effects ── */
        @keyframes neon-pulse {
          0%, 100% { box-shadow: 0 0 6px #3b82f6, 0 0 18px #3b82f6, 0 0 36px rgba(59,130,246,0.4); }
          50%       { box-shadow: 0 0 12px #3b82f6, 0 0 36px #3b82f6, 0 0 72px rgba(59,130,246,0.6); }
        }
        @keyframes neon-text-flash {
          0%, 100% { text-shadow: 0 0 4px #fff, 0 0 10px #3b82f6, 0 0 20px #3b82f6; }
          50%       { text-shadow: 0 0 6px #fff, 0 0 22px #3b82f6, 0 0 44px #3b82f6, 0 0 66px rgba(59,130,246,0.5); }
        }
        @keyframes neon-green {
          0%, 100% { box-shadow: 0 0 6px #10b981, 0 0 18px #10b981, 0 0 36px rgba(16,185,129,0.3); }
          50%       { box-shadow: 0 0 10px #10b981, 0 0 30px #10b981, 0 0 60px rgba(16,185,129,0.5); }
        }
        @keyframes neon-rose {
          0%, 100% { box-shadow: 0 0 6px #f43f5e, 0 0 18px #f43f5e, 0 0 36px rgba(244,63,94,0.3); }
          50%       { box-shadow: 0 0 10px #f43f5e, 0 0 30px #f43f5e, 0 0 60px rgba(244,63,94,0.5); }
        }
        @keyframes border-flow {
          0%   { border-color: #3b82f6; }
          33%  { border-color: #8b5cf6; }
          66%  { border-color: #10b981; }
          100% { border-color: #3b82f6; }
        }
        .neon-glow        { animation: neon-pulse 2.4s ease-in-out infinite; }
        .neon-text        { animation: neon-text-flash 2.4s ease-in-out infinite; }
        .neon-green       { animation: neon-green 2s ease-in-out infinite; }
        .neon-rose        { animation: neon-rose 2s ease-in-out infinite; }
        .neon-border-flow { animation: border-flow 4s linear infinite; border-width: 1px; border-style: solid; }
        .neo-card {
          background: rgba(2,6,23,0.75);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(59,130,246,0.18);
          box-shadow: 0 0 0 1px rgba(59,130,246,0.06), inset 0 1px 0 rgba(255,255,255,0.04);
          transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .neo-card:hover {
          border-color: rgba(59,130,246,0.45);
          box-shadow: 0 0 24px rgba(59,130,246,0.2), inset 0 0 24px rgba(59,130,246,0.04);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen selection:bg-blue-500/30">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
